name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions: {}

jobs:
  audit:
    uses: netresearch/.github/.github/workflows/python-audit.yml@main
    permissions:
      contents: read
    with:
      python-version-file: pyproject.toml
      package-manager: uv
